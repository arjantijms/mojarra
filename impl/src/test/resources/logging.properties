# Suppress expected SEVERE/WARNING logging during unit tests.
# These messages (missing InjectionProvider, bad flash cookies, failing PhaseListeners)
# are expected outside a container and in tests that deliberately trigger error paths.
#
# jakarta.faces: FactoryFinderInstance, UIViewRoot
# com.sun.faces: ExceptionHandlerImpl, FacesServletImpl
jakarta.faces.level = OFF
com.sun.faces.level = OFF
